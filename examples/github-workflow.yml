name: SkillProof

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npx --yes github:starinzlob/skillproof check . --profile codex --format github --smoke --strict
